<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card Preview Gallery</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ── Toolbar ── */
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toolbar-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #888;
    white-space: nowrap;
  }

  .name-btn {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    color: #ccc;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .name-btn:hover { background: #333; color: #fff; }
  .name-btn.active { background: #444; border-color: #666; color: #fff; }

  .swatch-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 3px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform .1s, border-color .1s;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.active { border-color: #fff; transform: scale(1.15); }

  /* ── Gallery ── */
  #gallery {
    padding: 24px 20px;
  }

  .section-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: #555;
    margin: 28px 0 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid #222;
  }
  .section-header:first-child { margin-top: 0; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
  }

  /* ── Card Slot ── */
  .card-slot {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-slot-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .card-slot-label {
    font-size: 12px;
    color: #ccc;
    font-weight: 500;
  }

  .card-slot-id {
    font-size: 10px;
    font-family: monospace;
    color: #555;
  }

  /* The frame keeps 300:533 aspect ratio */
  .card-frame {
    width: 100%;
    aspect-ratio: 300 / 533;
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    background: #1a1a1a;
  }

  /* The inner wrapper scales the 300×533 card down to fit the frame */
  .card-scale-wrapper {
    position: absolute;
    top: 0; left: 0;
    width: 300px;
    height: 533px;
    transform-origin: top left;
    /* scale set via JS */
  }

  .card-scale-wrapper > div {
    width: 300px !important;
    height: 533px !important;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div class="toolbar-group">
    <span class="toolbar-label">Name</span>

// ── Build Toolbar ──────────────────────────────────────────────────────────
const swatchContainer = document.getElementById('swatches');
ACCENT_COLORS.forEach(hex => {
  const s = document.createElement('div');
  s.className = 'swatch' + (hex === currentColor ? ' active' : '');
  s.style.background = hex;
  s.title = hex;
  s.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(el => el.classList.remove('active'));
    s.classList.add('active');
    currentColor = hex;
    renderGallery();
  });
  swatchContainer.appendChild(s);
});

document.querySelectorAll('.name-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentName = btn.dataset.name;
    renderGallery();
  });
});

// ── Render Gallery ─────────────────────────────────────────────────────────
function renderGallery() {
  const gallery = document.getElementById('gallery');
  const data = getData();

  // Group cards by section
  const sections = {};
  CARDS.forEach(card => {
    const sec = card.section || 'New Designs';
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push(card);
  });

  gallery.innerHTML = '';

  Object.entries(sections).forEach(([sectionName, cards]) => {
    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = sectionName;
    gallery.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'cards-grid';

    cards.forEach(card => {
      const slot = document.createElement('div');
      slot.className = 'card-slot';

      const meta = document.createElement('div');
      meta.className = 'card-slot-meta';
      meta.innerHTML = `<span class="card-slot-label">${card.label}</span><span class="card-slot-id">${card.id}</span>`;

      const frame = document.createElement('div');
      frame.className = 'card-frame';

      const wrapper = document.createElement('div');
      wrapper.className = 'card-scale-wrapper';
      wrapper.innerHTML = card.render(data, currentColor);

      frame.appendChild(wrapper);
      slot.appendChild(meta);
      slot.appendChild(frame);
      grid.appendChild(slot);
    });

    gallery.appendChild(grid);
  });

  // Scale each card to fit its frame
  requestAnimationFrame(scaleCards);
}

function scaleCards() {
  document.querySelectorAll('.card-frame').forEach(frame => {
    const wrapper = frame.querySelector('.card-scale-wrapper');
    if (!wrapper) return;
    const scale = frame.offsetWidth / 300;
    wrapper.style.transform = `scale(${scale})`;
    frame.style.height = (533 * scale) + 'px';
  });
}

// Re-scale on resize
window.addEventListener('resize', scaleCards);

// Initial render
renderGallery();
</script>
</body>
</html>
